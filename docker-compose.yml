version: "3.8"

services:
  # ── Monitor de salud del sistema ─────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: lifeos-uptime
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    # Acceder via Tailscale: http://<tailscale-ip>:3001

  # ── App de notas Markdown ────────────────────────────────────
  memos:
    image: neosmemo/memos:stable
    container_name: lifeos-memos
    restart: unless-stopped
    ports:
      - "5230:5230"
    volumes:
      - ./data/memos:/var/opt/memos
    environment:
      - MEMOS_MODE=prod
      - MEMOS_PORT=5230
    # Token: Settings > Access Tokens → copiar a .env como MEMOS_TOKEN

  # ── Presupuesto personal local-first (Actual Budget) ─────────
  actual:
    image: actualbudget/actual-server:latest
    container_name: lifeos-actual
    restart: unless-stopped
    ports:
      - "5006:5006"
    volumes:
      - ./data/actual:/data
    environment:
      - ACTUAL_UPLOAD_FILE_SYNC_SIZE_LIMIT_MB=20
    # Acceder: http://localhost:5006
    # Usar para tracking gastos Didi + deudas DIAN + ahorro

  # ── Backup streaming de SQLite (Litestream) ───────────────────
  litestream:
    image: litestream/litestream:latest
    container_name: lifeos-litestream
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./litestream.yml:/etc/litestream.yml
    command: replicate
    # Replica memoria_hipocampo.db localmente a data/backups/
    # Para activar: crear litestream.yml con la config abajo

  # ── Crawler LLM-optimizado (opcional, requiere Python) ───────
  # crawl4ai:
  #   image: unclecode/crawl4ai:latest
  #   container_name: lifeos-crawl4ai
  #   restart: unless-stopped
  #   ports:
  #     - "11235:11235"
  #   environment:
  #     - CRAWL4AI_API_TOKEN=lifeos-local

volumes:
  uptime-kuma-data:
