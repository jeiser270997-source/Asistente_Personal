version: '3.8'

services:
  # Dashboard Next.js — monta el repo en modo lectura para leer datos locales
  lifeos-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: lifeos-dashboard
    ports:
      - "3000:3000"
    environment:
      - IS_DOCKER=true
    volumes:
      - ./:/host_data:ro
    restart: unless-stopped
