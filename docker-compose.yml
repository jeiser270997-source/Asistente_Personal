version: '3.8'

services:
  lifeos-dashboard:
    build: 
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: lifeos-dashboard
    ports:
      - "3000:3000"
    environment:
      - IS_DOCKER=true
    volumes:
      # Montamos las carpetas de datos del host como solo-lectura para seguridad
      - ./:/host_data:ro
    restart: unless-stopped
