version: '3.8'

services:
  # Servicio de tu Dashboard de Next.js
  lifeos-dashboard:
    build: 
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: lifeos-dashboard
    ports:
      - "3000:3000"
    environment:
      - IS_DOCKER=true
    volumes:
      - ./:/host_data:ro
    restart: unless-stopped
    depends_on:
      - lifeos-postgres

  # NUEVO: Base de datos relacional de producción para tu Roadmap Full Stack
  lifeos-postgres:
    image: postgres:16-alpine
    container_name: lifeos-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=lifeos_prod
      - POSTGRES_USER=jeiser_admin
      - POSTGRES_PASSWORD=tu_contraseña_segura_aqui
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
