# FIX-104: Cifrado age para proteger datos financieros/legales/psicológicos en reposo.
# La clave privada la detecta Litestream automáticamente desde la variable de
# entorno LITESTREAM_AGE_KEY. NO uses `identity` con la clave inline — Litestream
# espera un PATH de archivo ahí, no el contenido. Usar la env var es más seguro.
#
# Generar par de claves:
#   age-keygen -o /etc/litestream/key.txt
#   cat /etc/litestream/key.txt  # ← esto es LITESTREAM_AGE_KEY
#   age-keygen -y /etc/litestream/key.txt  # ← esto es LITESTREAM_AGE_RECIPIENT
age:
  recipient: ${LITESTREAM_AGE_RECIPIENT}
  # NOTA: identity no necesita configurarse aquí explícitamente.
  # Litestream lee LITESTREAM_AGE_KEY del entorno automáticamente.
  # Si prefieres un archivo: identity: /etc/litestream/key.txt

dbs:
  - path: data/memoria_hipocampo.db
    replicas:
      - type: s3
        bucket: lifeos-db
        path: memoria_hipocampo
        endpoint: ${R2_ENDPOINT}
        access-key-id: ${R2_ACCESS_KEY_ID}
        secret-access-key: ${R2_SECRET_ACCESS_KEY}

  - path: runtime/lifeos.db
    replicas:
      - type: s3
        bucket: lifeos-db
        path: lifeos
        endpoint: ${R2_ENDPOINT}
        access-key-id: ${R2_ACCESS_KEY_ID}
        secret-access-key: ${R2_SECRET_ACCESS_KEY}

  - path: wheel-saver/data/top_repos.db
    replicas:
      - type: s3
        bucket: lifeos-db
        path: top_repos
        endpoint: ${R2_ENDPOINT}
        access-key-id: ${R2_ACCESS_KEY_ID}
        secret-access-key: ${R2_SECRET_ACCESS_KEY}
