name: Runtime Audit

on:
  pull_request:
    paths:
      - 'scripts/**/*.js'
      - 'lib/**/*.js'
      - 'runtime/**/*.js'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run runtime:ci
