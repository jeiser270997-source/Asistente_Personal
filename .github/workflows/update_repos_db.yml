name: Update Repos DB

on:
  schedule:
    - cron: '0 9 * * 1'  # Lunes 9am UTC (4am Colombia)
  workflow_dispatch:       # Ejecución manual

jobs:
  update-db:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Litestream
        run: |
          curl -sL https://github.com/benbjohnson/litestream/releases/download/v0.3.13/litestream-v0.3.13-linux-amd64.tar.gz | tar -xz
          sudo mv litestream /usr/local/bin/

      - name: Restore Databases from Cloudflare R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p data runtime
          litestream restore -if-replica-exists -config litestream.yml data/memoria_hipocampo.db
          litestream restore -if-replica-exists -config litestream.yml runtime/lifeos.db


      - name: Update repos DB desde EvanLi
        run: litestream replicate -config litestream.yml -exec "node scripts/dev/update_repos_db.js"
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit y push si hay cambios
        run: |
          git config user.name "LifeOS Bot"
          git config user.email "lifeos@jeiser.dev"
          :: # Cache files no se versionan mas
          git diff --cached --quiet && echo "Sin cambios, nada que pushear." && exit 0
          git commit -m "auto: repos_db actualizada $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin main
