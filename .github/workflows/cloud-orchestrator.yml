name: Jarvis Cloud Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-brain:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Instalar dependencias
      run: npm install --legacy-peer-deps

    - name: Setup Litestream
      run: |
        curl -sL https://github.com/benbjohnson/litestream/releases/download/v0.3.13/litestream-v0.3.13-linux-amd64.tar.gz | tar -xz
        sudo mv litestream /usr/local/bin/

    - name: Restore Databases from Cloudflare R2
      env:
        R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      run: |
        mkdir -p data runtime wheel-saver/data
        litestream restore -if-replica-exists -config litestream.yml data/memoria_hipocampo.db
        litestream restore -if-replica-exists -config litestream.yml runtime/lifeos.db
        litestream restore -if-replica-exists -config litestream.yml wheel-saver/data/top_repos.db

    - name: Inyectar Credenciales de Google (Desde Secrets)
      env:
        CREDS: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        TOKEN: ${{ secrets.GOOGLE_TOKEN_JSON }}
      run: node -e "const fs=require('fs');fs.writeFileSync('credentials.json',process.env.CREDS||'');fs.writeFileSync('.google_token.json',process.env.TOKEN||'');console.log('ok');"

    - name: Ejecutar Brain Orchestrator
      env:
        R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}  # Alias para WheelSaver
        SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
        COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
        HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        HF_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}  # Alias para WheelSaver
        MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      run: |
        litestream replicate -config litestream.yml -exec "node scripts/schedulers/brain_orchestrator.js"

    - name: Commit y push de base de datos actualizada
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        git config user.name "jarvis-bot"
        git config user.email "jarvis@lifeos.local"
        git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
        git add .
        git diff --cached --quiet || (git commit -m "chore(brain): actualizar base de datos tras ciclo de pensamiento matutino" && git push)

