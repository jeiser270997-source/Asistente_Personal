name: Jarvis Cloud Orchestrator

on:
  workflow_dispatch: # Permite ejecutarlo manualmente con un botï¿½n en GitHub

jobs:
  run-brain:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Instalar dependencias
      run: npm install --legacy-peer-deps

    - name: Inyectar Credenciales de Google (Desde Secrets)
      env:
        CREDS: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        TOKEN: ${{ secrets.GOOGLE_TOKEN_JSON }}
      run: node -e "const fs=require('fs');fs.writeFileSync('credentials.json',process.env.CREDS||'');fs.writeFileSync('token.json',process.env.TOKEN||'');console.log('credentials.json y token.json creados');"

    - name: Ejecutar Brain Orchestrator
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
        COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
        HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      run: node scripts/schedulers/brain_orchestrator.js

      - name: Commit y push de base de datos actualizada
        env:
          GH_TOKEN: $\{{ github.token \}}
        run: |
          git config user.name "jarvis-bot"
          git config user.email "jarvis@lifeos.local"
          git remote set-url origin https://x-access-token:$\{{ github.token \}}@github.com/$\{{ github.repository \}}.git
          git add runtime/lifeos.db data/memoria_hipocampo.db
          git diff --cached --quiet || (git commit -m "chore(brain): actualizar base de datos tras ciclo de pensamiento matutino" && git push)

