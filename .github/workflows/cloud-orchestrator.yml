name: Jarvis Cloud Orchestrator

on:
  schedule:
    # Se ejecuta a las 12:00 UTC, que son las 07:00 AM en Colombia (UTC-5)
    - cron: '0 12 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente con un botón en GitHub

jobs:
  run-brain:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Instalar dependencias
      run: npm install --legacy-peer-deps

    - name: Inyectar Credenciales de Google (Desde Secrets)
      env:
        CREDS: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        TOKEN: ${{ secrets.GOOGLE_TOKEN_JSON }}
      run: node -e "const fs=require('fs');fs.writeFileSync('credentials.json',process.env.CREDS||'');fs.writeFileSync('token.json',process.env.TOKEN||'');console.log('credentials.json y token.json creados');"

    - name: Ejecutar Brain Orchestrator
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      run: node scripts/brain_orchestrator.js
