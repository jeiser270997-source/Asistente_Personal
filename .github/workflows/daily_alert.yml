name: Daily Telegram Alert

on:
  schedule:
    # 12:00 UTC es 7:00 AM COT (Hora de Colombia)
    - cron: '0 12 * * *'
  workflow_dispatch: # Permitir ejecución manual

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run notification script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/notify.js
      - name: Commit state
        continue-on-error: true
        run: |
          git config user.name "daily-alert"
          git config user.email "daily-alert@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "chore(daily): persist alert state"
          git push
