name: Seed R2 Database
on: workflow_dispatch
jobs:
  seed:
    runs-on: ubuntu-24.04
    steps:
      - name: Recuperar las DB del historial
        uses: actions/checkout@v4
        with:
          ref: c0b479a

      - name: Traer la configuracion actual
        run: git checkout main -- litestream.yml

      - name: Instalar Litestream
        run: |
          curl -sL https://github.com/benbjohnson/litestream/releases/download/v0.3.13/litestream-v0.3.13-linux-amd64.tar.gz | tar -xz
          sudo mv litestream /usr/local/bin/

      - name: Subir a Cloudflare R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          litestream replicate -config litestream.yml &
          PID=$!
          echo "Subiendo bases de datos a la nube..."
          sleep 10
          kill -TERM $PID
          wait $PID || true
          echo "¡Sincronización inicial exitosa!"
