name: DIAN MUISCA Scraper

on:
  schedule:
    - cron: '0 14 * * 1'   # Lunes 9am Colombia (2pm UTC) — semanal
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - run: npx playwright install chromium --with-deps
      - name: Scrape DIAN MUISCA
        env:
          DIAN_USER: ${{ secrets.DIAN_USER }}
          DIAN_PASS: ${{ secrets.DIAN_PASS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/integrations/dian_scraper.js
      - name: Commit datos DIAN
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "jarvis-bot"
          git config user.email "jarvis@lifeos.local"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          git add data/cache/dian/
          git diff --cached --quiet || (git commit -m "chore(dian): actualizacion datos MUISCA" && git push)
