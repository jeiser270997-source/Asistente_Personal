name: SENA Moodle Scraper

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --legacy-peer-deps

      - name: Setup Litestream
        run: |
          curl -sL https://github.com/benbjohnson/litestream/releases/download/v0.3.13/litestream-v0.3.13-linux-amd64.tar.gz | tar -xz
          sudo mv litestream /usr/local/bin/

      - name: Restore Databases from Cloudflare R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p data runtime
          litestream restore -if-replica-exists -config litestream.yml data/memoria_hipocampo.db
          litestream restore -if-replica-exists -config litestream.yml runtime/lifeos.db
      - run: npx playwright install chromium --with-deps
      - name: Scrape SENA Moodle
        env:
          SENA_MOODLE_USER: ${{ secrets.SENA_MOODLE_USER }}
          SENA_MOODLE_PASS: ${{ secrets.SENA_MOODLE_PASS }}
          SENA_MOODLE_COURSE_ID: '121953'
        run: |
          litestream replicate -config litestream.yml -exec "node scripts/integrations/moodle_sena_scraper.js"
      - name: Commit data if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "jarvis-bot"
          git config user.email "jarvis@lifeos.local"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add data/state/sena/ data/state/contexto_maestro/ALERTAS_SENA.md
          git diff --cached --quiet || (git commit -m "chore(sena): actualizacion automatica de datos Moodle" && git push)
