name: DeepSeek Recordatorio

on:
  schedule:
    # 6 AM Colombia (11 UTC) — horario del día
    - cron: '0 11 * * *'
    # 7 PM Colombia (0 UTC) — aviso 1h antes del pico
    - cron: '0 0 * * *'
    # 10 PM Colombia (3 UTC) — aviso 1h antes del valle
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - run: node scripts/recordatorio_deepseek.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
