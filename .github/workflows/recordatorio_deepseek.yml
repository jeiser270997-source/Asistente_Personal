name: Recordatorio DeepSeek

on:
  schedule:
    # 06:00am Colombia = 11:00 UTC
    - cron: '0 11 * * *'
    # 07:00pm Colombia = 00:00 UTC (medianoche)
    - cron: '0 0 * * *'
    # 10:00pm Colombia = 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send DeepSeek reminder
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/integrations/recordatorio_deepseek.js
