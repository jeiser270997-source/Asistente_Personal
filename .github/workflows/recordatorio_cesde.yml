name: Recordatorio CESDE

on:
  # DESACTIVADO — recordatorios Telegram dan error
  # schedule:
  #   - cron: '0 22 * * 1,3,5'
  #   - cron: '0 2 * * 6'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - name: Recordatorio
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/recordatorios_cesde.js
