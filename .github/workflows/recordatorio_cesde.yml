name: Recordatorio CESDE — Curso Introductorio

on:
  schedule:
    # Clase 4: Mié 8 Jul — aviso 5pm Colombia (22:00 UTC)
    - cron: '0 22 8 7 *'
    # Clase 5: Vie 10 Jul
    - cron: '0 22 10 7 *'
    # Clase 6: Mié 15 Jul
    - cron: '0 22 15 7 *'
    # Clase 7: Vie 17 Jul
    - cron: '0 22 17 7 *'
    # Clase 8: Mié 22 Jul
    - cron: '0 22 22 7 *'
    # Clase 9: Vie 24 Jul — Asignación del taller
    - cron: '0 22 24 7 *'
    # Clase 10: Lun 27 Jul — Entrega del taller
    - cron: '0 22 27 7 *'
    # Recordatorio extra noche anterior al 27 (dom 26 Jul)
    - cron: '0 3 27 7 *'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --legacy-peer-deps

      - name: Recordatorio clase CESDE
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          node -e "
          const fetch = (...a) => import('node-fetch').then(({default:f})=>f(...a));
          const TOKEN = process.env.TELEGRAM_BOT_TOKEN;
          const CHAT  = process.env.TELEGRAM_CHAT_ID;

          const now = new Date();
          const day = now.getUTCDate();
          const month = now.getUTCMonth() + 1; // 7 = julio
          const hour = now.getUTCHours();

          // Mapa de clases
          const clases = {
            '7-8':  { num: 4, emoji: '📚' },
            '7-10': { num: 5, emoji: '📚' },
            '7-15': { num: 6, emoji: '📚' },
            '7-17': { num: 7, emoji: '📚' },
            '7-22': { num: 8, emoji: '📚' },
            '7-24': { num: 9, emoji: '📋', extra: '🎯 HOY ASIGNAN EL TALLER' },
            '7-27': { num: 10, emoji: '🏁', extra: '⚠️ ÚLTIMO DÍA — Entrega del taller' },
          };

          const key = month + '-' + day;
          const clase = clases[key];

          let msg;
          if (clase && hour >= 20) {
            // Aviso nocturno día 26 (antes del 27)
            msg = '⚠️ CESDE — Recordatorio\n\nMañana es la Clase 10 (último día).\n🏁 Revisión y entrega del taller\n📅 Lunes 27 Jul · 6-8pm\n\n¡Asegúrate de tener el taller listo!';
          } else if (clase) {
            msg = clase.emoji + ' CESDE — Clase ' + clase.num + ' HOY\n📅 6:00–8:00 PM\n';
            if (clase.extra) msg += '\n' + clase.extra;
          } else {
            msg = '📚 CESDE recordatorio';
          }

          fetch('https://api.telegram.org/bot' + TOKEN + '/sendMessage', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ chat_id: CHAT, text: msg, parse_mode: 'HTML' })
          }).then(r=>r.json()).then(d=>console.log(d.ok ? '✅ Enviado' : '❌ Error: ' + JSON.stringify(d)));
          "
