name: Recordatorio CESDE

on:
  schedule:
    # Horario actual: Lun/Mié/Vie 6-8pm Colombia → 22:00 UTC 1h antes
    - cron: '0 22 * * 1,3,5'
    # Horario próximo: Sábados 7am-6pm Colombia → recordatorio viernes 9pm (sábado 2am UTC)
    - cron: '0 2 * * 6'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - name: Recordatorio
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/recordatorios_cesde.js
