name: Recordatorio CESDE

on:
  schedule:
    # Lunes, Miércoles, Viernes 05:00pm Colombia = 22:00 UTC
    - cron: '0 22 * * 1,3,5'
    # Sábados 02:00am UTC (recordatorio matutino antes de clase)
    - cron: '0 2 * * 6'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send CESDE reminder
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/integrations/recordatorios_cesde.js
