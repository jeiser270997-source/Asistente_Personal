name: LifeOS CI & Syntax Check

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Instalar dependencias del sistema (compilación native addons)
      run: sudo apt-get update && sudo apt-get install -y python3 make g++

    - name: Instalar dependencias principales
      run: npm install

    - name: Verificación de Sintaxis (Dry Run)
      run: |
        echo "Verificando scripts principales..."
        node --check lib/integrations/telegram.js
        node --check scripts/schedulers/brain_orchestrator.js
        node --check scripts/integrations/inbox_sensor.js
        node --check scripts/jobs/computrabajo_apply.js
        node --check scripts/jobs/computrabajo_scraper.js
        node --check scripts/jobs/job_loop.js
        echo "✅ Código JavaScript válido."

    - name: Validar workflows YAML (actionlint)
      uses: rhysd/actionlint@v1.7.12
      with:
        args: -color

    - name: Verificación de TypeScript
      run: |
        echo "Compilando TypeScript..."
        npx tsc --noEmit
        echo "✅ Código TypeScript válido."

    - name: Ejecutar tests
      run: npx vitest run
