name: LifeOS CI & Syntax Check

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [20.x] # Usamos la versión LTS de Node

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Instalar dependencias principales
      run: npm install --legacy-peer-deps

    - name: Instalar dependencias de Gmail Cleaner
      run: cd Herramientas/Gmail_Cleaner && npm install --legacy-peer-deps

    - name: Verificación de Sintaxis (Dry Run)
      run: |
        echo "Verificando scripts principales..."
        node --check lib/telegram.js
        node --check scripts/schedulers/brain_orchestrator.js
        node --check scripts/integrations/inbox_sensor.js
        node --check Herramientas/Gmail_Cleaner/cli.js
        echo "✅ Todo el código es válido."
