name: LifeOS CI Guardrail

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    name: Run Unit Tests & Runtime CI Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Reindex Skills
        run: npm run skills:reindex

      - name: Run Test Suite
        run: npm test

      - name: Run Runtime CI Audit
        run: npm run runtime:ci
