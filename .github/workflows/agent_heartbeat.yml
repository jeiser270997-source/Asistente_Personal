name: Agent Heartbeat

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Run inbox sensor
        run: node scripts/inbox_sensor.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit processed state
        run: |
          git config user.name "agent-heartbeat"
          git config user.email "agent-heartbeat@users.noreply.github.com"
          git add logs/processed_emails.json
          git diff --cached --quiet || git commit -m "chore(heartbeat): persist inbox sensor state"
          git push
