name: Agent Heartbeat

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Restore Google OAuth files
        env:
          GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          echo "$GOOGLE_CREDENTIALS_B64" | base64 -d > credentials.json
          echo "$GOOGLE_TOKEN_JSON" > token.json

      - name: Run inbox sensor
        run: node scripts/inbox_sensor.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit processed state
        continue-on-error: true
        run: |
          git config user.name "agent-heartbeat"
          git config user.email "agent-heartbeat@users.noreply.github.com"
          git add data/processed_emails.json || true
          git diff --cached --quiet || git commit -m "chore(heartbeat): persist inbox sensor state"
          git push
