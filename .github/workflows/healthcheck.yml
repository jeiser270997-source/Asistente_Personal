name: Healthcheck

on:
  schedule:
    - cron: '0 13 * * *'   # 08:00 Colombia (UTC-5)
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-22.04
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Litestream
        run: |
          curl -fsSL https://github.com/benbjohnson/litestream/releases/download/v0.3.13/litestream-v0.3.13-linux-amd64.tar.gz | tar -xz
          sudo mv litestream /usr/local/bin/

      - name: Restore databases from R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p runtime data
          litestream restore -if-replica-exists -config litestream.yml runtime/lifeos.db || true
          litestream restore -if-replica-exists -config litestream.yml data/memoria_hipocampo.db || true
          echo "✅ DBs restauradas"

      - name: Run migrations
        run: node runtime/migrate.js

      - name: Runtime audit (CI mode)
        run: npm run runtime:ci
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
