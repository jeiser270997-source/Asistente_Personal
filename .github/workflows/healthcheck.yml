name: Healthcheck

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - name: Run healthcheck
        run: node scripts/diagnostics/healthcheck.js
      - name: Commit health report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "jarvis-bot"
          git config user.email "jarvis@lifeos.local"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          echo "health.json ya no se versiona (cache)"
          git diff --cached --quiet || (git commit -m "chore(health): healthcheck diario" && git push)
