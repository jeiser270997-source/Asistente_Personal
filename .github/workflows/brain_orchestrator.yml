name: Brain Orchestrator

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 18 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - name: Restore Google OAuth files
        env:
          GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          echo "$GOOGLE_CREDENTIALS_B64" | base64 -d > credentials.json
          echo "$GOOGLE_TOKEN_JSON" > token.json
      - name: Run brain orchestrator
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: node scripts/brain_orchestrator.js
      - name: Commit state
        continue-on-error: true
        run: |
          git config user.name "brain-orchestrator"
          git config user.email "brain-orchestrator@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "chore(brain): persist orchestrator state"
          git push
