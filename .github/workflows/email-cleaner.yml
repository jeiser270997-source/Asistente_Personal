name: Email Cleaner

on:
  schedule:
    - cron: '0 */3 * * *'   # Cada 3 horas
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Litestream
        run: |
          curl -fsSL https://github.com/benbjohnson/litestream/releases/download/v0.3.13/litestream-v0.3.13-linux-amd64.tar.gz | tar -xz
          sudo mv litestream /usr/local/bin/

      - name: Restore databases from R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p runtime lib/data
          litestream restore -if-replica-exists -config litestream.yml runtime/lifeos.db || true
          litestream restore -if-replica-exists -config litestream.yml lib/data/memoria_hipocampo.db || true
          echo "✅ DBs restauradas"

      - name: Run migrations
        run: node runtime/migrate.js

      - name: Run Email Processor
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p data/auth
          if [ -n "$GOOGLE_CREDENTIALS_JSON" ]; then
            echo "$GOOGLE_CREDENTIALS_JSON" > data/auth/gmail_credentials.json
          fi
          if [ -n "$GOOGLE_TOKEN_JSON" ]; then
            echo "$GOOGLE_TOKEN_JSON" > data/auth/gmail_token.json
          fi
          node scripts/integrations/email_processor.js


      - name: Replicate databases to R2
        if: always()
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          litestream replicate -exec "echo done" -config litestream.yml &
          sleep 10
          kill %1 2>/dev/null || true
