name: Email Cleaner

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:
    inputs:
      hours:
        description: 'Horas hacia atras para escanear (default: 6)'
        required: false
        default: '6'
        type: string

permissions:
  contents: write

jobs:
  process-emails:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install --legacy-peer-deps

      - name: Setup Litestream
        run: |
          curl -sL https://github.com/benbjohnson/litestream/releases/download/v0.3.13/litestream-v0.3.13-linux-amd64.tar.gz | tar -xz
          sudo mv litestream /usr/local/bin/

      - name: Restore Databases from Cloudflare R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p data runtime
          litestream restore -if-replica-exists -config litestream.yml data/memoria_hipocampo.db
          litestream restore -if-replica-exists -config litestream.yml runtime/lifeos.db

      - name: Inyectar credenciales Google
        env:
          CREDS: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          TOKEN: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: node -e "const fs=require('fs');fs.writeFileSync('credentials.json',process.env.CREDS||'');fs.writeFileSync('.google_token.json',process.env.TOKEN||'');console.log('ok');"

      - name: Ejecutar Email Processor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}  # Alias para WheelSaver
        SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
        HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        HF_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}  # Alias para WheelSaver
        MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          EMAIL_SCAN_HOURS: ${{ inputs.hours || '6' }}
        run: |
          litestream replicate -config litestream.yml -exec "node scripts/integrations/email_processor.js"

      - name: Commit y push de base de datos actualizada
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "jarvis-bot"
          git config user.email "jarvis@lifeos.local"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add data/state/ data/cache/ data/artifacts/
          git diff --cached --quiet || (git commit -m "chore(email): actualizar base de datos tras limpieza de correo" && git push)
