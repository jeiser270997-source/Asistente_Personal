name: Jarvis Loop

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  think:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm install

      - name: Restore runtime DB from cache
        uses: actions/cache@v4
        id: db-cache
        with:
          path: runtime/lifeos.db
          key: lifeos-db-${{ github.run_id }}
          restore-keys: lifeos-db-

      - name: Jarvis thinking cycle
        run: node scripts/jarvis_loop.js --once
        env:
          STORAGE_DRIVER: sqlite
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Persist runtime DB
        uses: actions/cache@v4
        with:
          path: runtime/lifeos.db
          key: lifeos-db-${{ github.run_id }}
