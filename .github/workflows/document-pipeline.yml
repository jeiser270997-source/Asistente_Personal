name: Document Pipeline

on:
  schedule:
    - cron: '0 14 * * *'   # 09:00 Colombia (UTC-5)
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Litestream
        run: |
          curl -fsSL https://github.com/benbjohnson/litestream/releases/download/v0.3.13/litestream-v0.3.13-linux-amd64.tar.gz | tar -xz
          sudo mv litestream /usr/local/bin/

      - name: Restore databases from R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p runtime data
          litestream restore -if-replica-exists -config litestream.yml runtime/lifeos.db || true
          litestream restore -if-replica-exists -config litestream.yml data/memoria_hipocampo.db || true
          echo "✅ DBs restauradas"

      - name: Run migrations
        run: node runtime/migrate.js

      - name: Run Document Analyzer
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/maintenance/analyze_documents.js

      - name: Replicate databases to R2
        if: always()
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          litestream replicate -exec "echo done" -config litestream.yml &
          sleep 10
          kill %1 2>/dev/null || true
