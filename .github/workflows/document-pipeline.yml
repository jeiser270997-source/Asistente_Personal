name: Document Pipeline

on:
  schedule:
    - cron: '0 14 * * *'  # 9 AM Colombia (14 UTC)
  workflow_dispatch:

jobs:
  document-pipeline:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install --legacy-peer-deps

      - name: Inyectar credenciales Google
        env:
          CREDS: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          TOKEN: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: node -e "const fs=require('fs');fs.writeFileSync('credentials.json',process.env.CREDS||'');fs.writeFileSync('token.json',process.env.TOKEN||'');"

      - name: Ejecutar Document Pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scripts/document_pipeline.js

      - name: Guardar documentos procesados
        uses: actions/upload-artifact@v4
        with:
          name: documentos-analizados
          path: data/documentos/
          retention-days: 7
